name: Build all NPM projects

on:
  push:
  pull_request:

jobs:
  vet:
    runs-on: ubuntu-latest
    name: Vet code
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          version: "1.3.11"

      - name: Install dependencies
        run: |
          bun install
        shell: bash

      - name: Vet
        run: |
          bun vet:ci
        shell: bash

  test:
    runs-on: ubuntu-latest
    needs: [vet]
    name: Test
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          version: "1.3.11"

      - name: Install dependencies
        run: |
          bun install
        shell: bash

      - name: Test
        run: |
          bun test:ci
        shell: bash

  build:
    runs-on: ubuntu-latest
    needs: [vet, test]
    name: Build
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          version: "1.3.11"

      - name: Install dependencies
        run: |
          bun install
        shell: bash

      # Needed for esbuild
      - uses: actions/setup-go@v6
        with:
          go-version: "^1.25"
          cache-dependency-path: go.sum

      - name: Build
        run: |
          bun run build
        shell: bash

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref_name == 'main'
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/deploy-pages@v5
